<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lies mich 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff8fab;
    --pink2: #ffb3c6;
    --pale: #ffe0ec;
    --lilac: #d4a8d8;
    --cream: #fff0f5;
    --brown: #5c3d4e;
    --red: #e63946;
    --white: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe0ec 0%, #f5e6ff 50%, #ffe8f5 100%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  .floaters { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .floater { position:absolute; animation: floatUp linear infinite; opacity:0; }
  @keyframes floatUp {
    0%   { transform:translateY(110vh) rotate(0deg); opacity:0; }
    8%   { opacity:0.65; }
    92%  { opacity:0.65; }
    100% { transform:translateY(-10vh) rotate(20deg); opacity:0; }
  }

  .page { display:none; width:100%; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; padding: 20px 0; }
  .page.active { display:flex; }

  .card {
    position:relative; z-index:1;
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(10px);
    border-radius: 36px;
    padding: 32px 24px 28px;
    max-width: 380px;
    width: 94vw;
    text-align: center;
    box-shadow: 0 12px 60px rgba(255,143,171,0.28);
    border: 2px solid rgba(255,179,198,0.4);
    animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { transform:translateY(40px) scale(0.94); opacity:0; }
    to   { transform:translateY(0) scale(1); opacity:1; }
  }

  .chars { display:flex; justify-content:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .char { animation:bounce ease-in-out infinite; }
  .char:nth-child(1){animation-duration:2.2s;animation-delay:0s;}
  .char:nth-child(2){animation-duration:2.6s;animation-delay:0.3s;}
  .char:nth-child(3){animation-duration:2.4s;animation-delay:0.6s;}
  .char:nth-child(4){animation-duration:2.8s;animation-delay:0.15s;}
  .char:nth-child(5){animation-duration:2.3s;animation-delay:0.45s;}
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  .title { font-family:'Pacifico',cursive; font-size:22px; color:var(--pink); margin-bottom:8px; }
  .subtitle { font-size:13px; color:var(--brown); opacity:0.7; font-weight:300; margin-bottom:20px; line-height:1.6; }

  /* YES/NO */
  .btn-row { display:flex; gap:16px; justify-content:center; align-items:center; position:relative; height:60px; }
  .btn-yes {
    background: linear-gradient(135deg, #ff8fab, #d4a8d8);
    color:white; font-family:'Nunito',sans-serif; font-weight:700; font-size:16px;
    padding:14px 36px; border-radius:50px; border:none; cursor:pointer;
    box-shadow:0 5px 22px rgba(255,143,171,0.45);
    transition:transform 0.18s, box-shadow 0.18s;
    position: absolute; left: 20px;
  }
  .btn-yes:hover { transform:translateY(-3px) scale(1.05); }
  .btn-no {
    background:white; color:var(--pink); font-family:'Nunito',sans-serif;
    font-weight:600; font-size:15px; padding:12px 24px; border-radius:50px;
    border:2px solid var(--pink2); cursor:pointer; position:absolute; right:20px;
    white-space:nowrap;
  }

  /* CALENDAR */
  .step-title { font-family:'Pacifico',cursive; font-size:19px; color:var(--pink); margin-bottom:4px; }
  .step-sub { font-size:11.5px; color:var(--brown); opacity:0.65; margin-bottom:14px; font-weight:300; }

  .select-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--pink); font-weight:600; margin-bottom:8px; display:block; text-align:left; }

  /* Calendar */
  .calendar { margin-bottom:14px; }
  .cal-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
  }
  .cal-month { font-family:'Pacifico',cursive; font-size:15px; color:var(--brown); }
  .cal-nav {
    background:var(--pale); border:none; border-radius:50%; width:28px; height:28px;
    cursor:pointer; font-size:14px; color:var(--brown); display:flex; align-items:center; justify-content:center;
  }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-day-name { font-size:9px; color:var(--pink); font-weight:700; text-align:center; padding:3px 0; text-transform:uppercase; letter-spacing:0.5px; }
  .cal-day {
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    border-radius:50%; font-size:12px; color:var(--brown); cursor:pointer;
    transition:all 0.18s; font-weight:400;
  }
  .cal-day:hover:not(.disabled):not(.empty) { background:var(--pale); }
  .cal-day.today { font-weight:700; color:var(--pink); }
  .cal-day.selected { background:var(--pink) !important; color:white !important; font-weight:700; }
  .cal-day.disabled { color:#ccc; cursor:default; }
  .cal-day.empty { cursor:default; }

  /* Time slots */
  .time-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px; max-height:160px; overflow-y:auto; }
  .time-grid::-webkit-scrollbar { width:4px; }
  .time-grid::-webkit-scrollbar-thumb { background:var(--pink2); border-radius:4px; }
  .opt-btn {
    background:var(--pale); border:1.5px solid var(--pink2); border-radius:14px;
    padding:7px 4px; font-family:'Nunito',sans-serif; font-size:12px;
    color:var(--brown); cursor:pointer; transition:all 0.18s;
  }
  .opt-btn:hover { background:var(--pink2); color:white; }
  .opt-btn.selected { background:var(--pink); border-color:var(--pink); color:white; font-weight:700; }

  .btn-confirm {
    background:linear-gradient(135deg,#ff8fab,#d4a8d8); color:white;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:15px;
    padding:13px 32px; border-radius:50px; border:none; cursor:pointer;
    box-shadow:0 5px 22px rgba(255,143,171,0.4);
    transition:transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    opacity:0.35; pointer-events:none; width:100%;
  }
  .btn-confirm.ready { opacity:1; pointer-events:all; }
  .btn-confirm.ready:hover { transform:translateY(-2px) scale(1.02); }

  /* Confirm page */
  .confirm-emoji { font-size:52px; margin-bottom:12px; animation:bounce 2s ease-in-out infinite; }
  .confirm-title { font-family:'Pacifico',cursive; font-size:22px; color:var(--pink); margin-bottom:10px; }
  .confirm-selection {
    background:var(--pale); border-radius:16px; padding:14px 18px;
    margin:14px 0; font-size:15px; color:var(--brown); font-weight:700;
    line-height:1.6;
  }
  .confirm-text { font-size:13px; color:var(--brown); line-height:1.75; opacity:0.78; }
  .char-strip { font-size:18px; margin-top:18px; letter-spacing:6px; opacity:0.55; }
</style>
</head>

<!-- PAGE 2: Kalender + Uhrzeit -->
<div class="page" id="page2">
<div class="card">
  <div class="step-title">Wann passt es dir? 🌸</div>
  <div class="step-sub">Such dir einen Moment aus 💕</div>

  <span class="select-label">📅 Welcher Tag?</span>
  <div class="calendar">
    <div class="cal-header">
      <button class="cal-nav" id="prevMonth" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <span class="select-label">🕐 Uhrzeit? (12:00 – 24:00)</span>
  <div class="time-grid" id="timeGrid"></div>

  <button class="btn-confirm" id="btnConfirm" onclick="goToConfirm()">Bestätigen 🎀</button>
</div>
</div>

<!-- PAGE 3: Bestätigung -->
<div class="page" id="page3">
<div class="card">
  <div class="confirm-emoji">🎀</div>
  <div class="confirm-title">Danke 💕</div>
  <div class="confirm-selection" id="confirmText"></div>
  <div class="confirm-text">Ich freu mich sehr darauf.<br>Bis dann 🌸</div>
  <div class="char-strip">🌸 💕 ✨ 🎀 ✨ 💕 🌸</div>
</div>
</div>

<script src="https://cdn.counter.dev/script.js" data-id="94ed8444-eed7-41fc-aa8f-2e44d5bbf4e8" data-utcoffset="2"></script>
<script>
  // Floaters
  const emojis=['🌸','✨','🎀','💕','⭐','🌷','💫','🐾'];
  const f=document.getElementById('floaters');
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='floater';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'%';
    el.style.fontSize=(Math.random()*14+10)+'px';
    el.style.animationDuration=(Math.random()*12+8)+'s';
    el.style.animationDelay=(Math.random()*12)+'s';
    f.appendChild(el);
  }

  // Nein button runs away - constantly moving + flees on tap/hover
  const btnNo=document.getElementById('btnNo');
  let noInterval=null;

  function moveNo(){
    const card=btnNo.closest('.card');
    const maxX=card.offsetWidth-btnNo.offsetWidth-10;
    const randX=Math.max(0, Math.floor(Math.random()*maxX));
    const randY=(Math.random()-0.5)*30;
    btnNo.style.transition='all 0.4s cubic-bezier(.22,1,.36,1)';
    btnNo.style.right='auto';
    btnNo.style.left=randX+'px';
    btnNo.style.top=(20+randY)+'px';
  }

  // Auto-move every 1.2 seconds
  function startAutoMove(){
    moveNo();
    noInterval=setInterval(moveNo, 1200);
  }

  btnNo.addEventListener('mouseover', moveNo);
  btnNo.addEventListener('touchstart', moveNo, {passive:true});

  // Start after card is rendered
  setTimeout(startAutoMove, 800);

  // Calendar
  const today=new Date();
  let calYear=today.getFullYear();
  let calMonth=today.getMonth();
  let selectedDate=null;
  let selectedTime=null;

  const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const dayNames=['Mo','Di','Mi','Do','Fr','Sa','So'];

  function renderCalendar(){
    document.getElementById('calMonthLabel').textContent=monthNames[calMonth]+' '+calYear;
    const grid=document.getElementById('calGrid');
    grid.innerHTML='';
    dayNames.forEach(d=>{
      const el=document.createElement('div');
      el.className='cal-day-name';
      el.textContent=d;
      grid.appendChild(el);
    });
    const firstDay=new Date(calYear,calMonth,1);
    let startDow=firstDay.getDay(); // 0=Sun
    startDow=(startDow===0)?6:startDow-1; // Mon=0
    for(let i=0;i<startDow;i++){
      const el=document.createElement('div');
      el.className='cal-day empty';
      grid.appendChild(el);
    }
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    for(let d=1;d<=daysInMonth;d++){
      const el=document.createElement('div');
      el.className='cal-day';
      el.textContent=d;
      const thisDate=new Date(calYear,calMonth,d);
      const todayMid=new Date(today.getFullYear(),today.getMonth(),today.getDate());
      if(thisDate<todayMid){
        el.classList.add('disabled');
      } else {
        if(thisDate.getTime()===todayMid.getTime()) el.classList.add('today');
        if(selectedDate&&thisDate.toDateString()===selectedDate.toDateString()) el.classList.add('selected');
        el.onclick=()=>selectDate(thisDate,el);
      }
      grid.appendChild(el);
    }
    const prevBtn=document.getElementById('prevMonth');
    prevBtn.style.opacity=(calYear===today.getFullYear()&&calMonth<=today.getMonth())?'0.3':'1';
    prevBtn.style.pointerEvents=(calYear===today.getFullYear()&&calMonth<=today.getMonth())?'none':'all';
  }

  function changeMonth(dir){
    calMonth+=dir;
    if(calMonth>11){calMonth=0;calYear++;}
    if(calMonth<0){calMonth=11;calYear--;}
    renderCalendar();
  }

  function selectDate(date,el){
    selectedDate=date;
    document.querySelectorAll('.cal-day.selected').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
    checkReady();
  }

  // Time slots 12:00 - 24:00 in 30min steps
  function renderTimes(){
    const grid=document.getElementById('timeGrid');
    grid.innerHTML='';
    for(let h=12;h<=23;h++){
      ['00','30'].forEach(m=>{
        const btn=document.createElement('button');
        btn.className='opt-btn';
        btn.textContent=h+':'+m;
        btn.onclick=()=>selectTime(btn,h+':'+m);
        grid.appendChild(btn);
      });
    }
    // 24:00
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent='24:00';
    btn.onclick=()=>selectTime(btn,'24:00');
    grid.appendChild(btn);
  }

  function selectTime(btn,time){
    document.querySelectorAll('#timeGrid .opt-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTime=time;
    checkReady();
  }

  function checkReady(){
    const btn=document.getElementById('btnConfirm');
    if(selectedDate&&selectedTime) btn.classList.add('ready');
    else btn.classList.remove('ready');
  }

  function goToStep2(){
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
    renderCalendar();
    renderTimes();
  }

  function goToConfirm(){
    if(!selectedDate||!selectedTime) return;
    const dayNames2=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    const dayStr=dayNames2[selectedDate.getDay()]+', '+selectedDate.getDate()+'. '+monthNames[selectedDate.getMonth()]+' '+selectedDate.getFullYear();
    document.getElementById('confirmText').innerHTML='📅 '+dayStr+'<br>🕐 '+selectedTime+' Uhr';
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page3').classList.add('active');

    // Send to Google Form silently
    fetch('https://formspree.io/f/xaqzyvrj', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
      body: JSON.stringify({tag: dayStr, uhrzeit: selectedTime + ' Uhr'})
    }).catch(()=>{});
  }

  renderCalendar();
</script>
</body>
</html>
