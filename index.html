<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lies mich 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;1,400&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff8fab;
    --pink-light: #ffb3c6;
    --pink-pale: #ffe0ec;
    --cream: #fff0f5;
    --red: #e63946;
    --brown: #5c3d4e;
    --white: #ffffff;
    --lilac: #d4a8d8;
    --mint: #a8d8c8;
    --yellow: #ffd166;
    --blue: #a8c8e8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, #ffe0ec 0%, #f0e8ff 50%, #ffe8f0 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Floating elements */
  .floaters { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .floater {
    position:absolute;
    animation: floatUp linear infinite;
    font-size: 18px;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity:0; }
    8%   { opacity: 0.7; }
    92%  { opacity: 0.7; }
    100% { transform: translateY(-10vh) rotate(25deg); opacity:0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-radius: 36px;
    padding: 36px 30px 32px;
    max-width: 380px;
    width: 92vw;
    text-align: center;
    box-shadow: 0 10px 60px rgba(255,143,171,0.25), 0 2px 12px rgba(200,100,150,0.10);
    animation: cardIn 0.8s cubic-bezier(.22,1,.36,1) both;
    border: 2px solid rgba(255,179,198,0.4);
  }
  @keyframes cardIn {
    from { transform: translateY(50px) scale(0.93); opacity:0; }
    to   { transform: translateY(0) scale(1); opacity:1; }
  }

  /* Characters row */
  .chars {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .char { animation: charBounce ease-in-out infinite; }
  .char:nth-child(1) { animation-duration: 2.2s; animation-delay: 0s; }
  .char:nth-child(2) { animation-duration: 2.6s; animation-delay: 0.3s; }
  .char:nth-child(3) { animation-duration: 2.4s; animation-delay: 0.6s; }
  .char:nth-child(4) { animation-duration: 2.8s; animation-delay: 0.15s; }
  .char:nth-child(5) { animation-duration: 2.3s; animation-delay: 0.45s; }
  @keyframes charBounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  svg.char-svg { overflow: visible; }

  .greeting {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    color: var(--pink);
    margin-bottom: 6px;
  }
  .sub {
    font-size: 13.5px;
    color: var(--brown);
    opacity: 0.72;
    font-weight: 300;
    margin-bottom: 20px;
    line-height: 1.65;
  }
  .message {
    background: linear-gradient(135deg, #fff0f8, #f5eeff);
    border-radius: 20px;
    padding: 18px 20px;
    font-size: 14px;
    color: var(--brown);
    line-height: 1.8;
    margin-bottom: 24px;
    text-align: left;
    border: 1.5px solid rgba(255,179,198,0.35);
  }
  .heart { color: var(--pink); }

  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #ff8fab, #d4a8d8);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 15px 34px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 5px 22px rgba(255,143,171,0.42);
    transition: transform 0.18s, box-shadow 0.18s;
    letter-spacing: 0.3px;
  }
  .btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 9px 30px rgba(255,143,171,0.52); }
  .btn:active { transform: scale(0.97); }
  .btn-hint { font-size: 11px; color: var(--pink-light); margin-top: 10px; font-weight: 300; }

  /* Bottom char strip */
  .char-strip {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 22px;
    opacity: 0.6;
    font-size: 20px;
  }
</style>
</head>
<body>

<div class="floaters" id="floaters"></div>

<div class="card">

  <!-- Characters row: Hello Kitty, Cinnamoroll, My Melody, cute dog, cute cat -->
  <div class="chars">

    <!-- Hello Kitty -->
    <svg class="char char-svg" width="52" height="56" viewBox="0 0 52 56">
      <!-- ears -->
      <ellipse cx="12" cy="12" rx="9" ry="10" fill="#fff5f8" stroke="#5c3d4e" stroke-width="1.8"/>
      <ellipse cx="12" cy="12" rx="5" ry="6" fill="#ffb3c6"/>
      <ellipse cx="40" cy="12" rx="9" ry="10" fill="#fff5f8" stroke="#5c3d4e" stroke-width="1.8"/>
      <ellipse cx="40" cy="12" rx="5" ry="6" fill="#ffb3c6"/>
      <!-- head -->
      <ellipse cx="26" cy="34" rx="22" ry="20" fill="white" stroke="#5c3d4e" stroke-width="1.8"/>
      <!-- eyes -->
      <circle cx="18" cy="30" r="3" fill="#5c3d4e"/>
      <circle cx="34" cy="30" r="3" fill="#5c3d4e"/>
      <!-- nose -->
      <ellipse cx="26" cy="36" rx="3" ry="2.5" fill="#e63946"/>
      <!-- whiskers -->
      <line x1="4" y1="33" x2="16" y2="35" stroke="#5c3d4e" stroke-width="1" opacity="0.5"/>
      <line x1="4" y1="38" x2="16" y2="37" stroke="#5c3d4e" stroke-width="1" opacity="0.5"/>
      <line x1="48" y1="33" x2="36" y2="35" stroke="#5c3d4e" stroke-width="1" opacity="0.5"/>
      <line x1="48" y1="38" x2="36" y2="37" stroke="#5c3d4e" stroke-width="1" opacity="0.5"/>
      <!-- bow -->
      <ellipse cx="37" cy="16" rx="5" ry="4" fill="#e63946"/>
      <ellipse cx="44" cy="16" rx="5" ry="4" fill="#e63946"/>
      <circle cx="40.5" cy="16" r="3" fill="#c1121f"/>
    </svg>

    <!-- Cinnamoroll (white fluffy dog with big blue eyes) -->
    <svg class="char char-svg" width="52" height="56" viewBox="0 0 52 56">
      <!-- ears (long floppy) -->
      <ellipse cx="10" cy="16" rx="8" ry="13" fill="#e8eeff" stroke="#5c3d4e" stroke-width="1.8"/>
      <ellipse cx="42" cy="16" rx="8" ry="13" fill="#e8eeff" stroke="#5c3d4e" stroke-width="1.8"/>
      <!-- head big round -->
      <circle cx="26" cy="32" r="21" fill="white" stroke="#5c3d4e" stroke-width="1.8"/>
      <!-- big blue eyes -->
      <circle cx="19" cy="30" r="5" fill="#a8c8e8"/>
      <circle cx="33" cy="30" r="5" fill="#a8c8e8"/>
      <circle cx="19" cy="30" r="3" fill="#5c3d4e"/>
      <circle cx="33" cy="30" r="3" fill="#5c3d4e"/>
      <circle cx="20" cy="29" r="1.2" fill="white"/>
      <circle cx="34" cy="29" r="1.2" fill="white"/>
      <!-- pink nose -->
      <ellipse cx="26" cy="37" rx="3" ry="2" fill="#ffb3c6"/>
      <!-- blush -->
      <ellipse cx="14" cy="37" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.4"/>
      <ellipse cx="38" cy="37" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.4"/>
      <!-- tiny tail on top -->
      <ellipse cx="26" cy="11" rx="4" ry="5" fill="white" stroke="#5c3d4e" stroke-width="1.5"/>
    </svg>

    <!-- My Melody (bunny with hood) -->
    <svg class="char char-svg" width="52" height="56" viewBox="0 0 52 56">
      <!-- bunny ears inside hood -->
      <ellipse cx="16" cy="10" rx="6" ry="11" fill="#f8c8d8" stroke="#5c3d4e" stroke-width="1.8"/>
      <ellipse cx="36" cy="10" rx="6" ry="11" fill="#f8c8d8" stroke="#5c3d4e" stroke-width="1.8"/>
      <ellipse cx="16" cy="10" rx="3" ry="7" fill="#e8a0b8"/>
      <ellipse cx="36" cy="10" rx="3" ry="7" fill="#e8a0b8"/>
      <!-- pink hood -->
      <path d="M4 28 Q4 8 26 8 Q48 8 48 28 Z" fill="#f8c8d8" stroke="#5c3d4e" stroke-width="1.8"/>
      <!-- face -->
      <circle cx="26" cy="36" r="18" fill="white" stroke="#5c3d4e" stroke-width="1.8"/>
      <!-- eyes small dots -->
      <circle cx="20" cy="33" r="2.5" fill="#5c3d4e"/>
      <circle cx="32" cy="33" r="2.5" fill="#5c3d4e"/>
      <!-- tiny red oval nose -->
      <ellipse cx="26" cy="39" rx="3" ry="2" fill="#e63946"/>
      <!-- blush -->
      <ellipse cx="14" cy="39" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.5"/>
      <ellipse cx="38" cy="39" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.5"/>
    </svg>

    <!-- Cute dog (shiba/pomeranian style) -->
    <svg class="char char-svg" width="52" height="56" viewBox="0 0 52 56">
      <!-- ears pointy -->
      <polygon points="8,18 2,4 18,14" fill="#f0c888" stroke="#5c3d4e" stroke-width="1.8" stroke-linejoin="round"/>
      <polygon points="44,18 50,4 34,14" fill="#f0c888" stroke="#5c3d4e" stroke-width="1.8" stroke-linejoin="round"/>
      <polygon points="10,17 5,7 17,14" fill="#f8dca8"/>
      <polygon points="42,17 47,7 35,14" fill="#f8dca8"/>
      <!-- head -->
      <ellipse cx="26" cy="34" rx="22" ry="20" fill="#f8dca8" stroke="#5c3d4e" stroke-width="1.8"/>
      <!-- muzzle -->
      <ellipse cx="26" cy="40" rx="11" ry="8" fill="#f0c888"/>
      <!-- nose -->
      <ellipse cx="26" cy="35" rx="4" ry="3" fill="#5c3d4e"/>
      <ellipse cx="27" cy="34" rx="1.5" ry="1" fill="white" opacity="0.6"/>
      <!-- eyes -->
      <circle cx="17" cy="28" r="4" fill="#5c3d4e"/>
      <circle cx="35" cy="28" r="4" fill="#5c3d4e"/>
      <circle cx="18" cy="27" r="1.5" fill="white"/>
      <circle cx="36" cy="27" r="1.5" fill="white"/>
      <!-- mouth -->
      <path d="M22 41 Q26 45 30 41" stroke="#5c3d4e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- blush -->
      <ellipse cx="11" cy="35" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.5"/>
      <ellipse cx="41" cy="35" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.5"/>
    </svg>

    <!-- Kuromi (black bunny) -->
    <svg class="char char-svg" width="52" height="56" viewBox="0 0 52 56">
      <!-- black bunny hood -->
      <ellipse cx="14" cy="10" rx="7" ry="12" fill="#3a3a4a" stroke="#5c3d4e" stroke-width="1.8"/>
      <ellipse cx="38" cy="10" rx="7" ry="12" fill="#3a3a4a" stroke="#5c3d4e" stroke-width="1.8"/>
      <ellipse cx="14" cy="10" rx="3.5" ry="8" fill="#d4a8d8"/>
      <ellipse cx="38" cy="10" rx="3.5" ry="8" fill="#d4a8d8"/>
      <!-- hood -->
      <path d="M3 28 Q3 7 26 7 Q49 7 49 28 Z" fill="#3a3a4a" stroke="#3a3a4a" stroke-width="1"/>
      <!-- skull on forehead -->
      <circle cx="26" cy="20" r="4" fill="white" opacity="0.8"/>
      <circle cx="24" cy="19" r="1" fill="#3a3a4a" opacity="0.8"/>
      <circle cx="28" cy="19" r="1" fill="#3a3a4a" opacity="0.8"/>
      <rect x="23" y="22" width="6" height="2" rx="1" fill="#3a3a4a" opacity="0.6"/>
      <!-- face white -->
      <circle cx="26" cy="37" r="17" fill="white" stroke="#5c3d4e" stroke-width="1.8"/>
      <!-- eyes big cute -->
      <circle cx="19" cy="35" r="4" fill="#5c3d4e"/>
      <circle cx="33" cy="35" r="4" fill="#5c3d4e"/>
      <circle cx="20" cy="34" r="1.5" fill="white"/>
      <circle cx="34" cy="34" r="1.5" fill="white"/>
      <!-- pink nose -->
      <ellipse cx="26" cy="41" rx="2.5" ry="2" fill="#e63946"/>
      <!-- mouth smirk -->
      <path d="M23 44 Q26 47 32 43" stroke="#5c3d4e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>

  </div>

  <div class="greeting">Heyyy 🎀</div>
  <div class="sub">Schön, dass du den Code gescannt hast.<br>Das bedeutet mir schon echt viel.</div>

  <div class="message">
    Ich frag dich um nichts Großes <br>
    nur ein kleines Treffen. Bisschen reden, das wars.<br>
    Such dir einfach aus, wann es für dich passt. <span class="heart">♡</span>
  </div>

  <a href="https://forms.gle/NvwtVb4iDUJZss5y5" class="btn">Wann passt es dir? 🌸</a>
  <div class="btn-hint">dauert nur 10 Sekunden ✨</div>

  <div class="char-strip">🐾 🎀 🌸 ✨ 🎀 🐾</div>
</div>

<script>
  const emojis = ['🌸','✨','🎀','🐾','💕','⭐','🌷','💫'];
  const f = document.getElementById('floaters');
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + '%';
    el.style.fontSize = (Math.random()*14+10) + 'px';
    el.style.animationDuration = (Math.random()*12+8) + 's';
    el.style.animationDelay = (Math.random()*12) + 's';
    f.appendChild(el);
  }
</script>
</body>
</html>
