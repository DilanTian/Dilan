<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lies mich 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff8fab;
    --pink2: #ffb3c6;
    --pale: #ffe0ec;
    --lilac: #d4a8d8;
    --cream: #fff0f5;
    --brown: #5c3d4e;
    --red: #e63946;
    --white: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe0ec 0%, #f5e6ff 50%, #ffe8f5 100%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating background */
  .floaters { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .floater { position:absolute; animation: floatUp linear infinite; opacity:0; }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity:0; }
    8%   { opacity:0.65; }
    92%  { opacity:0.65; }
    100% { transform: translateY(-10vh) rotate(20deg); opacity:0; }
  }

  /* Pages */
  .page { display:none; width:100%; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; }
  .page.active { display:flex; }

  /* Card */
  .card {
    position:relative; z-index:1;
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(10px);
    border-radius: 36px;
    padding: 36px 28px 30px;
    max-width: 360px;
    width: 92vw;
    text-align: center;
    box-shadow: 0 12px 60px rgba(255,143,171,0.28);
    border: 2px solid rgba(255,179,198,0.4);
    animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { transform: translateY(40px) scale(0.94); opacity:0; }
    to   { transform: translateY(0) scale(1); opacity:1; }
  }

  /* Characters */
  .chars { display:flex; justify-content:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .char { animation: bounce ease-in-out infinite; }
  .char:nth-child(1){animation-duration:2.2s;animation-delay:0s;}
  .char:nth-child(2){animation-duration:2.6s;animation-delay:0.3s;}
  .char:nth-child(3){animation-duration:2.4s;animation-delay:0.6s;}
  .char:nth-child(4){animation-duration:2.8s;animation-delay:0.15s;}
  .char:nth-child(5){animation-duration:2.3s;animation-delay:0.45s;}
  @keyframes bounce {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
  }

  .title { font-family:'Pacifico',cursive; font-size:24px; color:var(--pink); margin-bottom:8px; }
  .subtitle { font-size:13px; color:var(--brown); opacity:0.7; font-weight:300; margin-bottom:22px; line-height:1.6; }

  /* YES/NO buttons */
  .btn-row { display:flex; gap:16px; justify-content:center; align-items:center; margin-top:4px; position:relative; height:60px; }
  .btn-yes {
    background: linear-gradient(135deg, #ff8fab, #d4a8d8);
    color: white;
    font-family:'Nunito',sans-serif;
    font-weight:700; font-size:16px;
    padding:14px 36px;
    border-radius:50px;
    border:none; cursor:pointer;
    box-shadow: 0 5px 22px rgba(255,143,171,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn-yes:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 9px 28px rgba(255,143,171,0.55); }
  .btn-yes:active { transform:scale(0.97); }

  .btn-no {
    background: white;
    color: var(--pink);
    font-family:'Nunito',sans-serif;
    font-weight:600; font-size:15px;
    padding:12px 24px;
    border-radius:50px;
    border:2px solid var(--pink2);
    cursor:pointer;
    position:absolute;
    right:0;
    transition: none;
    white-space:nowrap;
  }

  /* Day/Time selection page */
  .step-title { font-family:'Pacifico',cursive; font-size:20px; color:var(--pink); margin-bottom:6px; }
  .step-sub { font-size:12px; color:var(--brown); opacity:0.65; margin-bottom:18px; font-weight:300; }

  .select-group { margin-bottom:16px; text-align:left; }
  .select-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--pink); font-weight:600; margin-bottom:8px; display:block; }
  .options-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .opt-btn {
    background: var(--pale);
    border: 2px solid var(--pink2);
    border-radius:20px;
    padding:8px 14px;
    font-family:'Nunito',sans-serif;
    font-size:13px;
    color:var(--brown);
    cursor:pointer;
    transition:all 0.18s;
    font-weight:400;
  }
  .opt-btn:hover { background:var(--pink2); color:white; }
  .opt-btn.selected { background:var(--pink); border-color:var(--pink); color:white; font-weight:700; }

  .btn-confirm {
    background: linear-gradient(135deg, #ff8fab, #d4a8d8);
    color:white;
    font-family:'Nunito',sans-serif;
    font-weight:700; font-size:15px;
    padding:14px 32px;
    border-radius:50px;
    border:none; cursor:pointer;
    box-shadow:0 5px 22px rgba(255,143,171,0.4);
    margin-top:8px;
    transition:transform 0.18s, box-shadow 0.18s;
    opacity:0.4;
    pointer-events:none;
  }
  .btn-confirm.ready { opacity:1; pointer-events:all; }
  .btn-confirm.ready:hover { transform:translateY(-2px) scale(1.03); }

  /* Confirmation page */
  .confirm-emoji { font-size:52px; margin-bottom:12px; animation:bounce 2s ease-in-out infinite; }
  .confirm-title { font-family:'Pacifico',cursive; font-size:22px; color:var(--pink); margin-bottom:10px; }
  .confirm-text { font-size:13.5px; color:var(--brown); line-height:1.75; opacity:0.8; }
  .confirm-selection {
    background:var(--pale);
    border-radius:16px;
    padding:12px 18px;
    margin:14px 0;
    font-size:14px;
    color:var(--brown);
    font-weight:600;
  }

  .char-strip { font-size:18px; margin-top:18px; letter-spacing:6px; opacity:0.55; }
</style>
</head>
<body>
<div class="floaters" id="floaters"></div>

      <ellipse cx="26" cy="11" rx="4" ry="5" fill="white" stroke="#5c3d4e" stroke-width="1.5"/>

    <svg class="char" width="48" height="52" viewBox="0 0 52 56">

    <svg class="char" width="48" height="52" viewBox="0 0 52 56">

  <div class="title">Willst du dich treffen? 🌸</div>

  <div class="btn-row" id="btnRow">
    <button class="btn-yes" onclick="goToStep2()">Ja 🎀</button>
    <button class="btn-no" id="btnNo">Nein</button>
  </div>
</div>
</div>

<!-- PAGE 2: Tag & Uhrzeit -->
<div class="page" id="page2">
<div class="card">
  <div class="step-title">Wann passt es dir? 🌸</div>
  <div class="step-sub">Such dir einfach einen Moment aus 💕</div>

  <div class="select-group">
    <span class="select-label">📅 Welcher Tag?</span>
    <div class="options-grid" id="dayOptions">
      <button class="opt-btn" onclick="selectDay(this)">Montag</button>
      <button class="opt-btn" onclick="selectDay(this)">Dienstag</button>
      <button class="opt-btn" onclick="selectDay(this)">Mittwoch</button>
      <button class="opt-btn" onclick="selectDay(this)">Donnerstag</button>
      <button class="opt-btn" onclick="selectDay(this)">Freitag</button>
      <button class="opt-btn" onclick="selectDay(this)">Samstag</button>
      <button class="opt-btn" onclick="selectDay(this)">Sonntag</button>
    </div>
  </div>

  <div class="select-group">
    <span class="select-label">🕐 Zu welcher Uhrzeit?</span>
    <div class="options-grid" id="timeOptions">
      <button class="opt-btn" onclick="selectTime(this)">10:00</button>
      <button class="opt-btn" onclick="selectTime(this)">12:00</button>
      <button class="opt-btn" onclick="selectTime(this)">14:00</button>
      <button class="opt-btn" onclick="selectTime(this)">16:00</button>
      <button class="opt-btn" onclick="selectTime(this)">18:00</button>
      <button class="opt-btn" onclick="selectTime(this)">20:00</button>
    </div>
  </div>

  <button class="btn-confirm" id="btnConfirm" onclick="goToConfirm()">Bestätigen 🎀</button>
</div>
</div>

<!-- PAGE 3: Bestätigung -->
<div class="page" id="page3">
<div class="card">
  <div class="confirm-emoji">🎀</div>
  <div class="confirm-title">Danke 💕</div>
  <div class="confirm-selection" id="confirmText"></div>
  <div class="confirm-text">Ich freu mich sehr darauf.<br>Bis dann 🌸</div>
  <div class="char-strip">🌸 💕 ✨ 🎀 ✨ 💕 🌸</div>
</div>
</div>

<script src="https://cdn.counter.dev/script.js" data-id="94ed8444-eed7-41fc-aa8f-2e44d5bbf4e8" data-utcoffset="2"></script>

<script>
  // Floating emojis
  const emojis = ['🌸','✨','🎀','💕','⭐','🌷','💫','🐾'];
  const f = document.getElementById('floaters');
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + '%';
    el.style.fontSize = (Math.random()*14+10) + 'px';
    el.style.animationDuration = (Math.random()*12+8) + 's';
    el.style.animationDelay = (Math.random()*12) + 's';
    f.appendChild(el);
  }

  // Nein button runs away
  const btnNo = document.getElementById('btnNo');
  const btnRow = document.getElementById('btnRow');
  btnNo.addEventListener('mouseover', moveNo);
  btnNo.addEventListener('touchstart', moveNo);

  function moveNo() {
    const rowRect = btnRow.getBoundingClientRect();
    const maxX = rowRect.width - btnNo.offsetWidth - 80;
    const randX = Math.random() * maxX;
    const randY = (Math.random() - 0.5) * 40;
    btnNo.style.position = 'absolute';
    btnNo.style.transition = 'all 0.25s cubic-bezier(.22,1,.36,1)';
    btnNo.style.right = 'auto';
    btnNo.style.left = randX + 'px';
    btnNo.style.top = (20 + randY) + 'px';
  }

  // Page navigation
  function goToStep2() {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
  }

  let selectedDay = '';
  let selectedTime = '';

  function selectDay(btn) {
    document.querySelectorAll('#dayOptions .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDay = btn.textContent;
    checkReady();
  }

  function selectTime(btn) {
    document.querySelectorAll('#timeOptions .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTime = btn.textContent;
    checkReady();
  }

  function checkReady() {
    const btn = document.getElementById('btnConfirm');
    if (selectedDay && selectedTime) {
      btn.classList.add('ready');
    }
  }

  function goToConfirm() {
    document.getElementById('confirmText').textContent = selectedDay + ' um ' + selectedTime + ' Uhr 🌸';
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page3').classList.add('active');
  }
</script>
</body>
</html>
